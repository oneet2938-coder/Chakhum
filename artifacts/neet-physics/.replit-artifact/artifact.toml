kind = "web"
previewPath = "/"
title = "Physics NEET Prep"
version = "1.0.0"
id = "artifacts/neet-physics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26246

[services.development]
run = "pnpm --filter @workspace/neet-physics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neet-physics", "run", "build" ]
publicDir = "artifacts/neet-physics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26246"
BASE_PATH = "/"
